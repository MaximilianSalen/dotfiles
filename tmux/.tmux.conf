# Load Oh My Tmux base config; keep your custom changes in ~/.tmux.conf.local
source-file ~/.oh-my-tmux/.tmux.conf

# Catppuccin theme + status modules
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Make tmux-cpu emit concrete colors for Catppuccin CPU module styling.
set -g @cpu_low_fg_color '#cdd6f4'
set -g @cpu_medium_fg_color '#cdd6f4'
set -g @cpu_high_fg_color '#11111b'
set -g @cpu_low_bg_color '#313244'
set -g @cpu_medium_bg_color '#313244'
set -g @cpu_high_bg_color '#f38ba8'

# Catppuccin status line layout
set -g status-left-length 100
set -g status-right-length 220
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#[fg=#{@thm_green}]#{@catppuccin_status_left_separator}#[fg=#{@thm_crust},bg=#{@thm_green}]󰍛 #[fg=#{@thm_fg},bg=#{@thm_surface_0}] RAM #(awk '/MemTotal/ {t=$2} /MemAvailable/ {a=$2} END {u=t-a; printf \"%.1f/%.1f GiB\", u/1048576, t/1048576}' /proc/meminfo)#[fg=#{@thm_surface_0}]#{@catppuccin_status_right_separator}"
set -ag status-right "#[fg=#{@thm_yellow}]#{@catppuccin_status_left_separator}#[fg=#{@thm_crust},bg=#{@thm_yellow},bold]Gothenburg #[nobold]#[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/.tmux/scripts/gothenburg_weather.sh || echo 'n/a')#[fg=#{@thm_surface_0}]#{@catppuccin_status_right_separator}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Interpolate CPU/battery placeholders inside the status modules.
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.tmux/plugins/tmux-battery/battery.tmux'
