general {
    hide_cursor = true
    grace = 3
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    brightness = 0.6
    vibrancy = 0.2
    noise = 0.02
}

# Time
label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = FiraCode Nerd Font
    color = rgba(242, 205, 205, 1)
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}

# Date
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d %B"
    font_size = 18
    font_family = FiraCode Nerd Font
    color = rgba(205, 214, 244, 0.8)
    position = 0, 120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    font_size = 16
    font_family = FiraCode Nerd Font
    color = rgba(205, 214, 244, 0.6)
    position = 0, -60
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(242, 205, 205, 0.4)
    inner_color = rgba(49, 50, 68, 0.8)
    font_color = rgba(205, 214, 244, 1)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>Password...</i>
    check_color = rgba(166, 227, 161, 0.8)
    fail_color = rgba(243, 139, 168, 0.8)
    fail_text = <i>$FAIL</i>
    capslock_color = rgba(249, 226, 175, 0.8)
    position = 0, -120
    halign = center
    valign = center
    immediate_render = true
    rounding = 12
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.3)
}
