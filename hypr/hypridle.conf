general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen after 3 minutes
listener {
    timeout = 180
    on-timeout = brightnessctl -s set 30%
    on-resume = brightnessctl -r
}

# Screen blank + lock after 5 minutes (matches GNOME: 300s blank, 0s lock delay)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 15 minutes on battery
listener {
    timeout = 900
    on-timeout = [ $(cat /sys/class/power_supply/*/online 2>/dev/null | head -1) = "0" ] && systemctl suspend
}
