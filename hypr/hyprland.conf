# ──────────────────────────────────────────────
# Machine-specific overrides (monitor, kb layout, etc.)
# ──────────────────────────────────────────────
source = ~/.config/hypr/local.conf

# ──────────────────────────────────────────────
# Monitor
# ──────────────────────────────────────────────
monitor=,preferred,auto,1

# ──────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────
exec-once = mpvpaper -o "no-audio loop" '*' ~/.config/hypr/wallpapers/1760341053.mp4
exec-once = waybar
exec-once = hypridle
exec-once = swaync
exec-once = /usr/libexec/hyprpolkitagent
exec-once = blueman-applet
exec-once = mkfifo /tmp/wobpipe && tail -f /tmp/wobpipe | wob
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = XCURSOR_THEME,catppuccin-mocha-flamingo-cursors
env = XCURSOR_SIZE,24

# ──────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────
input {
    kb_layout = se
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# ──────────────────────────────────────────────
# General appearance
# ──────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 10
        render_power = 3
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 3, ease
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# ──────────────────────────────────────────────
# Keybinds
# ──────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Space, exec, wofi --show drun
bind = $mod, Escape, exec, sleep 0.2 && hyprlock
bind = $mod, E, exec, nautilus
bind = $mod, N, exec, swaync-client -t -sw
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exec, wlogout
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, P, pseudo,
bind = $mod, S, togglesplit,
bind = $mod, D, exec, ~/.config/hypr/scripts/show-desktop.sh

# Move current workspace to other monitor
bind = $mod SHIFT, M, movecurrentworkspacetomonitor, +1

# Clipboard history
bind = $mod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && ~/.config/hypr/scripts/volume-notify.sh
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && ~/.config/hypr/scripts/volume-notify.sh
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/.config/hypr/scripts/volume-notify.sh
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && ~/.config/hypr/scripts/brightness-notify.sh
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && ~/.config/hypr/scripts/brightness-notify.sh

# Media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Screenshots
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window

# Move focus
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Arrow keys too
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize with mod + right mouse button
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# ──────────────────────────────────────────────
# Lid switch – lock, screen off, suspend
# ──────────────────────────────────────────────
bindl = , switch:on:Lid Switch, exec, hyprlock & sleep 0.5 && hyprctl dispatch dpms off && systemctl suspend
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

# ──────────────────────────────────────────────
# Window rules
# ──────────────────────────────────────────────
windowrule {
    name = float-pavucontrol
    float = on
    match:class = ^(pavucontrol)$
}

windowrule {
    name = float-nm-editor
    float = on
    match:class = ^(nm-connection-editor)$
}

windowrule {
    name = float-open-file
    float = on
    match:title = ^(Open File)$
}

windowrule {
    name = float-save-file
    float = on
    match:title = ^(Save File)$
}
